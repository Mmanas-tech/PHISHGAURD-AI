<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard - Site Blocked</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(239, 68, 68, 0.4);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    .shield {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      animation: shield-pulse 2s ease-in-out infinite;
    }

    .shield svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 30px rgba(239, 68, 68, 0.5));
    }

    @keyframes shield-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: text-glow 2s ease-in-out infinite alternate;
    }

    @keyframes text-glow {
      from { filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.3)); }
      to { filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.6)); }
    }

    .risk-score {
      font-size: 64px;
      font-weight: 800;
      font-family: "JetBrains Mono", monospace;
      color: #ef4444;
      margin: 24px 0;
      text-shadow: 0 0 40px rgba(239, 68, 68, 0.5);
    }

    .risk-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #ef4444;
      margin-bottom: 24px;
    }

    .signals {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      padding: 20px;
      margin: 24px 0;
      text-align: left;
    }

    .signals h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ef4444;
      margin-bottom: 12px;
    }

    .signal-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }

    .signal-item:last-child { border-bottom: none; }

    .signal-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 32px;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
    }

    .btn-safe {
      background: #10b981;
      color: white;
    }

    .btn-safe:hover {
      background: #059669;
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: transparent;
      color: #ef4444;
      border: 2px solid rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
    }

    .confirm-section {
      display: none;
      margin-top: 16px;
    }

    .confirm-section.visible {
      display: block;
      animation: fade-in 0.3s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .confirm-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: #f1f5f9;
      font-size: 14px;
      width: 200px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .confirm-input:focus {
      border-color: #ef4444;
    }

    .confirm-hint {
      font-size: 11px;
      color: #64748b;
      margin-top: 8px;
    }

    .report-link {
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
    }

    .report-link a {
      color: #00d4ff;
      text-decoration: none;
    }

    .report-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="shield">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <h1>Phishing Site Detected</h1>

    <div class="risk-score" id="riskScore">--</div>
    <div class="risk-label">Risk Score</div>

    <div class="signals" id="signalsContainer">
      <h3>Detected Threats</h3>
      <div id="signalsList"></div>
    </div>

    <div class="domain-info" style="font-size: 13px; color: #64748b; margin-bottom: 8px;">
      <span id="blockedDomain"></span>
    </div>

    <div class="actions">
      <button class="btn btn-safe" id="goBack">Go Back (Safe)</button>
      <button class="btn btn-danger" id="proceedBtn">I Understand the Risk</button>
    </div>

    <div class="confirm-section" id="confirmSection">
      <input type="text" class="confirm-input" id="confirmInput"
             placeholder="Type CONFIRM to proceed" autocomplete="off">
      <div class="confirm-hint">Type CONFIRM in all caps to continue</div>
    </div>

    <div class="report-link">
      Think this is a false positive? <a href="#" id="reportLink">Report it</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const blockedUrl = params.get("url") || "Unknown";
    const domain = params.get("domain") || "Unknown";
    const score = parseInt(params.get("score") || "0");
    const level = params.get("level") || "critical";
    let signals = [];

    try {
      signals = JSON.parse(params.get("signals") || "[]");
    } catch {}

    document.getElementById("riskScore").textContent = score;
    document.getElementById("blockedDomain").textContent = domain;

    const signalsList = document.getElementById("signalsList");
    signals.forEach(s => {
      const item = document.createElement("div");
      item.className = "signal-item";
      item.innerHTML = `
        <span class="signal-dot"></span>
        <span>${escapeHtml(s.name || "Unknown threat")}</span>
      `;
      signalsList.appendChild(item);
    });

    const particlesContainer = document.getElementById("particles");
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement("div");
      particle.className = "particle";
      particle.style.left = Math.random() * 100 + "%";
      particle.style.animationDuration = (3 + Math.random() * 4) + "s";
      particle.style.animationDelay = Math.random() * 5 + "s";
      particlesContainer.appendChild(particle);
    }

    document.getElementById("goBack").addEventListener("click", () => {
      history.back();
    });

    let confirmVisible = false;
    document.getElementById("proceedBtn").addEventListener("click", () => {
      if (!confirmVisible) {
        document.getElementById("confirmSection").classList.add("visible");
        document.getElementById("confirmInput").focus();
        confirmVisible = true;
      }
    });

    document.getElementById("confirmInput").addEventListener("input", (e) => {
      if (e.target.value === "CONFIRM") {
        chrome.runtime.sendMessage({ type: "PROCEED_ANYWAY" }, () => {
          window.location.href = blockedUrl;
        });
      }
    });

    document.getElementById("reportLink").addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = `http://localhost:3000/report?url=${encodeURIComponent(blockedUrl)}`;
    });

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
